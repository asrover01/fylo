<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | Fylo data storage component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <section class="flyo">
      <img src="./images/logo.svg" alt="fylo logo" class="logo">
      <div class="folder-line">
        <img src="./images/icon-document.svg" alt="document icon" class="icon">
        <img src="./images/icon-folder.svg" alt="folder icon" class="icon">
        <img src="./images/icon-upload.svg" alt="upload icon" class="icon">
       
      </div>
</section>
<section class="storage-left">
  
  <h2>You’ve used 815 GB of your storage</h2>
  <div class="bar-box">
      <div class="bar-inner">
        <div class="bar-circle">
      </div>
    </div>
  </div>
  <span class="range"><p class="measure=bar bar-start">0 GB</p>
     <p class="measure-bar bar-end">1000 GB</p>
  </span>
  
    <p class="amount-left">185 <span class="gb-left"> GB Left</span></p>
  
</section>
  </main>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>
</html>
